<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>widget-card demo</title>
  <link rel="stylesheet" href="../urirun_widgets/assets/widgets.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    nav a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    h1 { font-size: .95rem; color: #8b949e; margin: 12px 0; }
    .demo { max-width: 720px; display: grid; gap: 12px; }
    a { color: #58a6ff; font-size: 13px; }
  </style>
</head>
<body>
  <nav><a href="index.html">← all widgets</a></nav>
  <h1>widget: widget-card (dashboard)</h1>
  <div class="demo" id="output"></div>
  <script type="module">
    import { renderWidgetCard } from '../urirun_widgets/assets/widgets/widget-card.js';

    const el = document.getElementById('output');

    // card with a live table view
    el.innerHTML += renderWidgetCard(
      { id: 'scanner', label: 'Phone scanner', url: 'http://localhost:8196', status: 'running' },
      {
        view: 'table', title: 'Recent scans', status: 'running',
        data: { rows: [
          { file: 'FV-001.pdf', type: 'faktura', amount: '1230.00', date: '2026-06-25' },
          { file: 'paragon.jpg', type: 'paragon', amount: '42.50', date: '2026-06-26' },
        ]}
      }
    );

    // card with a graph view
    el.innerHTML += renderWidgetCard(
      { id: 'mesh', label: 'URI mesh', status: 'running' },
      {
        view: 'graph', title: 'Mesh nodes', status: 'running',
        data: {
          nodes: [{ id: 'laptop' }, { id: 'lenovo-201' }],
          edges: [{ from: 'laptop', to: 'lenovo-201' }]
        }
      }
    );

    // card with no view (iframe fallback)
    el.innerHTML += renderWidgetCard(
      { id: 'dashboard', label: 'Dashboard', url: 'http://localhost:8765', status: 'live' },
      null
    );
  </script>
</body>
</html>
