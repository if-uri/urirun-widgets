<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>video widget demo</title>
  <link rel="stylesheet" href="../urirun_widgets/assets/widgets.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    nav a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    h1 { font-size: .95rem; color: #8b949e; margin: 12px 0; }
    .demo { max-width: 720px; }
  </style>
</head>
<body>
  <nav><a href="index.html">← all widgets</a></nav>
  <h1>widget: video</h1>
  <div class="demo" id="output"></div>
  <script type="module">
    import { renderVideoServiceView } from '../urirun_widgets/assets/widgets/video.js';
    document.getElementById('output').innerHTML = renderVideoServiceView({
      view: 'video', title: 'Camera stream', status: 'running',
      data: { url: 'http://localhost:8195/stream.mjpeg' }
    });
  </script>
</body>
</html>
