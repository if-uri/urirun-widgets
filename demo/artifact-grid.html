<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>artifact-grid widget demo</title>
  <link rel="stylesheet" href="../urirun_widgets/assets/widgets.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
    nav a { color: #58a6ff; font-size: 13px; text-decoration: none; }
    h1 { font-size: .95rem; color: #8b949e; margin: 12px 0; }
    .demo { overflow: auto; }
    button { cursor: pointer; padding: 3px 8px; border: 1px solid #30363d; border-radius: 4px; background: #21262d; color: #c9d1d9; font-size: 11px; }
    button.danger { border-color: #f85149; color: #f85149; }
    a { color: #58a6ff; font-size: 12px; }
  </style>
</head>
<body>
  <nav><a href="index.html">← all widgets</a></nav>
  <h1>widget: artifact-grid</h1>
  <div class="demo" id="output"></div>
  <script type="module">
    import { renderArtifactFileGrid } from '../urirun_widgets/assets/widgets/artifact-grid.js';
    document.getElementById('output').innerHTML = renderArtifactFileGrid([
      {
        id: 'a1', path: '/scans/FV-001.pdf', kind: 'invoice', uri: 'doc://host/a1',
        created_at: '2026-06-25', duplicateCount: 1,
        meta: { detectedDocument: { type: 'faktura', date: '2026-06-24', amount: '1230.00', contractor: 'Acme Sp. z o.o.' } }
      },
      {
        id: 'a2', path: '/scans/paragon-001.jpg', kind: 'receipt', uri: 'doc://host/a2',
        created_at: '2026-06-26', duplicateCount: 2,
        meta: { detectedDocument: { type: 'paragon', date: '2026-06-26', amount: '42.50', supplier: 'Biedronka' } }
      },
    ], ['a1']);
  </script>
</body>
</html>
